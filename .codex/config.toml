model = "gpt-4o-mini"
model_provider = "mimo"

[model_providers.mimo]
name = "MiMo Token Plan"
base_url = "https://token-plan-sgp.xiaomimimo.com/v1"
env_key = "MIMO_API_KEY"
wire_api = "chat"

[profiles.agent]
model = "gpt-4o-mini"
model_provider = "mimo"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.safe]
model = "gpt-4o-mini"
model_provider = "mimo"
approval_policy = "on-request"
sandbox_mode = "read-only"